name: Sync Master Template to Projects

on:
  push:
    branches:
      - main
    paths:
      # Only run if core governance files or the script itself changes
      - '.Agents/**'
      - '.github/**'
      - '.cursorrules'
      - '.editorconfig'
      - '.prettierrc'
      - 'MADLABS_OPERATIONS.md'
      - 'scripts/utils/sync_master_to_projects.sh'
  
  # Allow manual trigger from the GitHub Actions UI
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Template Repository
        uses: actions/checkout@v4
        with:
          # Fetch full history if needed, though default 1 is usually fine
          fetch-depth: 1

      - name: Run Sync Script
        env:
          # Provide the PAT to the gh CLI
          GH_TOKEN: ${{ secrets.TEMPLATE_SYNC_PAT }}
        run: |
          # Set up Git identity for commits created by the script
          git config --global user.name "MADLABS Template Bot"
          git config --global user.email "bot@madlabs.lk"
          
          # Make the script executable
          chmod +x ./scripts/utils/sync_master_to_projects.sh
          
          # Run the sync script
          ./scripts/utils/sync_master_to_projects.sh
